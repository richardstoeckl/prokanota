databases:
  - name: test_pyhmmer
    enabled: true
    order: 10
    search_tool: pyhmmer
    db_path: "tests/data/mockDB/hmm/hmm_mockDB.hmm.h3m"
    mapping_path: "tests/data/mockDB/mockDB_profile_mapping.tsv"
    mapping_key: query_name
    evalue_cutoff: 1.0e-3
    columns:
      - name: test_pyhmmer_hit
        source: query_name
      - name: test_pyhmmer_accession
        source: accession
      - name: test_pyhmmer_short_name
        source: short_name
      - name: test_pyhmmer_description
        source: description
      - name: test_pyhmmer_category
        source: category
      - name: test_pyhmmer_evalue
        source: evalue
      - name: test_pyhmmer_score
        source: score
