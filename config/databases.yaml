# Database module configuration
# Each database must specify:
#   - name: Unique identifier (used in file paths and column prefixes)
#   - enabled: Whether to use this database
#   - order: Merge order in final table (lower = earlier)
#   - search_tool: One of [pyhmmer, rpsblast, diamond, mmseqs2]
#   - db_path: Path to prepared database files
#   - mapping_path: Path to mapping TSV (accession, short_name, description, category)
#   - evalue_cutoff: E-value threshold for filtering hits
#   - columns: List of output columns with name and source field

databases:
  - name: pgap
    enabled: false
    order: 10
    search_tool: pyhmmer
    db_path: "/path/to/hmm_PGAP.LIB"
    mapping_path: "/path/to/PGAP_mapping.tsv"
    evalue_cutoff: 1.0e-3
    columns:
      - name: pgap_hit
        source: query_name
      - name: pgap_short_name
        source: short_name
      - name: pgap_description
        source: description
      - name: pgap_category
        source: category
      - name: pgap_evalue
        source: evalue

  - name: cdd
    enabled: false
    order: 20
    search_tool: rpsblast
    db_path: "/path/to/cdd"
    mapping_path: "/path/to/CDD_mapping.tsv"
    evalue_cutoff: 1.0e-3
    columns:
      - name: cdd_hit
        source: accession
      - name: cdd_short_name
        source: short_name
      - name: cdd_description
        source: description
      - name: cdd_category
        source: category
      - name: cdd_evalue
        source: evalue

  - name: diamond_example
    enabled: false
    order: 30
    search_tool: diamond
    db_path: "/path/to/diamond.dmnd"
    mapping_path: "/path/to/DIAMOND_mapping.tsv"
    evalue_cutoff: 1.0e-3
    columns:
      - name: diamond_hit
        source: accession
      - name: diamond_short_name
        source: short_name
      - name: diamond_description
        source: description
      - name: diamond_category
        source: category
      - name: diamond_evalue
        source: evalue
      - name: diamond_score
        source: score
      - name: diamond_pident
        source: pident
      - name: diamond_length
        source: length

  - name: mmseqs2_example
    enabled: false
    order: 40
    search_tool: mmseqs2
    db_path: "/path/to/mmseqs2_db"
    mapping_path: "/path/to/MMSEQS2_mapping.tsv"
    evalue_cutoff: 1.0e-3
    mmseqs2_sensitivity: 5.7
    mmseqs2_max_seqs: 300
    mmseqs2_min_seq_id: 0.3
    mmseqs2_cov_mode: 0
    mmseqs2_coverage: 0.8
    columns:
      - name: mmseqs2_hit
        source: accession
      - name: mmseqs2_short_name
        source: short_name
      - name: mmseqs2_description
        source: description
      - name: mmseqs2_category
        source: category
      - name: mmseqs2_evalue
        source: evalue
      - name: mmseqs2_score
        source: score
      - name: mmseqs2_pident
        source: pident
      - name: mmseqs2_length
        source: length
